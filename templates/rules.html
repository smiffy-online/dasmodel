{% extends "base.html" %}
{% block title %}Rules - DasModel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0">Rules</h5>
  <button class="btn btn-sm btn-primary" id="btn-add-rule">Add rule</button>
</div>

<div id="rules-list"></div>

<!-- Add/Edit modal -->
<div class="modal fade" id="ruleModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="ruleModalTitle">Add rule</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="rule-id">
        <div class="mb-3">
          <label for="rule-text" class="form-label">Rule text</label>
          <textarea class="form-control" id="rule-text" rows="3"></textarea>
        </div>
        <div class="row">
          <div class="col-8 mb-3">
            <label for="rule-category" class="form-label">Category</label>
            <input type="text" class="form-control" id="rule-category" placeholder="Optional">
          </div>
          <div class="col-4 mb-3">
            <label for="rule-priority" class="form-label">Priority</label>
            <input type="number" class="form-control" id="rule-priority" value="0">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="btn-save-rule">Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const listEl = document.getElementById('rules-list');
  const modal = new bootstrap.Modal(document.getElementById('ruleModal'));
  let rules = [];

  async function loadRules() {
    const resp = await fetch('/api/rules');
    const data = await resp.json();
    rules = data.rules || [];
    render();
  }

  function render() {
    if (!rules.length) {
      listEl.innerHTML = '<p class="text-body-secondary">No rules defined.</p>';
      return;
    }

    let html = '<div class="list-group">';
    for (const rule of rules) {
      const active = rule.active ? 'checked' : '';
      const badge = rule.category
        ? '<span class="badge text-bg-info me-2">' + escapeHtml(rule.category) + '</span>'
        : '';
      const opacity = rule.active ? '' : ' opacity-50';

      html += '<div class="list-group-item' + opacity + '">'
        + '<div class="d-flex justify-content-between align-items-start">'
        + '<div class="flex-grow-1">'
        + badge
        + '<span class="me-2">' + escapeHtml(rule.rule_text) + '</span>'
        + '<small class="text-body-secondary">Priority: ' + rule.priority + '</small>'
        + '</div>'
        + '<div class="d-flex align-items-center gap-2">'
        + '<div class="form-check form-switch mb-0">'
        + '<input class="form-check-input" type="checkbox" role="switch" '
        + active + ' data-toggle-id="' + rule.id + '" title="Toggle active">'
        + '</div>'
        + '<button class="btn btn-sm btn-outline-secondary btn-edit" data-id="' + rule.id + '" title="Edit">Edit</button>'
        + '<button class="btn btn-sm btn-outline-danger btn-delete" data-id="' + rule.id + '" title="Delete">Del</button>'
        + '</div>'
        + '</div>'
        + '</div>';
    }
    html += '</div>';
    listEl.innerHTML = html;

    // Bind events
    listEl.querySelectorAll('[data-toggle-id]').forEach(function(el) {
      el.addEventListener('change', function() { toggleRule(parseInt(this.dataset.toggleId)); });
    });
    listEl.querySelectorAll('.btn-edit').forEach(function(el) {
      el.addEventListener('click', function() { editRule(parseInt(this.dataset.id)); });
    });
    listEl.querySelectorAll('.btn-delete').forEach(function(el) {
      el.addEventListener('click', function() { deleteRule(parseInt(this.dataset.id)); });
    });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  document.getElementById('btn-add-rule').addEventListener('click', function() {
    document.getElementById('ruleModalTitle').textContent = 'Add rule';
    document.getElementById('rule-id').value = '';
    document.getElementById('rule-text').value = '';
    document.getElementById('rule-category').value = '';
    document.getElementById('rule-priority').value = '0';
    modal.show();
  });

  function editRule(id) {
    const rule = rules.find(function(r) { return r.id === id; });
    if (!rule) return;
    document.getElementById('ruleModalTitle').textContent = 'Edit rule';
    document.getElementById('rule-id').value = id;
    document.getElementById('rule-text').value = rule.rule_text;
    document.getElementById('rule-category').value = rule.category || '';
    document.getElementById('rule-priority').value = rule.priority;
    modal.show();
  }

  document.getElementById('btn-save-rule').addEventListener('click', async function() {
    const id = document.getElementById('rule-id').value;
    const ruleText = document.getElementById('rule-text').value.trim();
    const category = document.getElementById('rule-category').value.trim();
    const priority = parseInt(document.getElementById('rule-priority').value, 10) || 0;

    if (!ruleText) return;

    const body = {rule_text: ruleText, category: category, priority: priority};

    if (id) {
      await fetch('/api/rules/' + id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
    } else {
      await fetch('/api/rules', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
    }

    modal.hide();
    loadRules();
  });

  async function toggleRule(id) {
    await fetch('/api/rules/' + id + '/toggle', {method: 'POST'});
    loadRules();
  }

  async function deleteRule(id) {
    if (!confirm('Delete this rule?')) return;
    await fetch('/api/rules/' + id, {method: 'DELETE'});
    loadRules();
  }

  loadRules();
})();
</script>
{% endblock %}
