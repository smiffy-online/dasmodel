{% extends "base.html" %}
{% block title %}Prompts - DasModel{% endblock %}

{% block head %}
<style>
  .prompt-template {
    font-family: monospace;
    font-size: 0.85rem;
    min-height: 200px;
  }
  .preview-output {
    white-space: pre-wrap;
    font-size: 0.85rem;
    background: var(--bs-tertiary-bg);
    border: 1px solid var(--bs-border-color);
    border-radius: 0.375rem;
    padding: 0.75rem;
    max-height: 400px;
    overflow-y: auto;
  }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0">Prompt Templates</h5>
  <button class="btn btn-sm btn-primary" id="btn-add-prompt">Add prompt</button>
</div>

<div id="prompts-list"></div>

<!-- Add/Edit modal -->
<div class="modal fade" id="promptModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="promptModalTitle">Add prompt</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="prompt-id">
        <div class="row mb-3">
          <div class="col-6">
            <label for="prompt-name" class="form-label">Name</label>
            <input type="text" class="form-control" id="prompt-name" placeholder="e.g. system_prompt">
          </div>
          <div class="col-6">
            <label for="prompt-desc" class="form-label">Description</label>
            <input type="text" class="form-control" id="prompt-desc" placeholder="Optional">
          </div>
        </div>
        <div class="mb-3">
          <label for="prompt-template" class="form-label">Template (Jinja2)</label>
          <textarea class="form-control prompt-template" id="prompt-template" rows="12"></textarea>
        </div>
        <div class="mb-3">
          <button type="button" class="btn btn-sm btn-outline-info" id="btn-preview">Preview</button>
          <div id="preview-area" class="mt-2" style="display:none;">
            <div class="preview-output" id="preview-output"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="btn-save-prompt">Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const listEl = document.getElementById('prompts-list');
  const modal = new bootstrap.Modal(document.getElementById('promptModal'));
  let prompts = [];

  async function loadPrompts() {
    const resp = await fetch('/api/prompts');
    const data = await resp.json();
    prompts = data.prompts || [];
    render();
  }

  function render() {
    if (!prompts.length) {
      listEl.innerHTML = '<p class="text-body-secondary">No prompts.</p>';
      return;
    }

    let html = '<div class="list-group">';
    for (const p of prompts) {
      const active = p.active ? '<span class="badge text-bg-success">Active</span>'
                               : '<span class="badge text-bg-secondary">Inactive</span>';
      const isSystem = p.id === 1;
      const desc = p.description ? '<small class="text-body-secondary ms-2">' + escapeHtml(p.description) + '</small>' : '';

      html += '<div class="list-group-item">'
        + '<div class="d-flex justify-content-between align-items-start">'
        + '<div>'
        + '<strong>' + escapeHtml(p.name) + '</strong> '
        + active + desc
        + '<div class="mt-1"><small class="text-body-secondary">Updated: ' + (p.updated_at || p.created_at) + '</small></div>'
        + '</div>'
        + '<div class="d-flex gap-2">'
        + '<button class="btn btn-sm btn-outline-secondary btn-edit" data-id="' + p.id + '">Edit</button>';

      if (!isSystem) {
        html += '<button class="btn btn-sm btn-outline-danger btn-delete" data-id="' + p.id + '">Del</button>';
      }

      html += '</div></div></div>';
    }
    html += '</div>';
    listEl.innerHTML = html;

    listEl.querySelectorAll('.btn-edit').forEach(function(el) {
      el.addEventListener('click', function() { editPrompt(parseInt(this.dataset.id)); });
    });
    listEl.querySelectorAll('.btn-delete').forEach(function(el) {
      el.addEventListener('click', function() { deletePrompt(parseInt(this.dataset.id)); });
    });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  document.getElementById('btn-add-prompt').addEventListener('click', function() {
    document.getElementById('promptModalTitle').textContent = 'Add prompt';
    document.getElementById('prompt-id').value = '';
    document.getElementById('prompt-name').value = '';
    document.getElementById('prompt-desc').value = '';
    document.getElementById('prompt-template').value = '';
    document.getElementById('preview-area').style.display = 'none';
    modal.show();
  });

  function editPrompt(id) {
    const p = prompts.find(function(x) { return x.id === id; });
    if (!p) return;
    document.getElementById('promptModalTitle').textContent = 'Edit prompt';
    document.getElementById('prompt-id').value = id;
    document.getElementById('prompt-name').value = p.name;
    document.getElementById('prompt-desc').value = p.description || '';
    document.getElementById('prompt-template').value = p.template;
    document.getElementById('preview-area').style.display = 'none';
    modal.show();
  }

  document.getElementById('btn-save-prompt').addEventListener('click', async function() {
    const id = document.getElementById('prompt-id').value;
    const name = document.getElementById('prompt-name').value.trim();
    const template = document.getElementById('prompt-template').value.trim();
    const description = document.getElementById('prompt-desc').value.trim();

    if (!name || !template) return;

    const body = {name: name, template: template, description: description};

    if (id) {
      await fetch('/api/prompts/' + id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
    } else {
      await fetch('/api/prompts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
    }

    modal.hide();
    loadPrompts();
  });

  document.getElementById('btn-preview').addEventListener('click', async function() {
    const template = document.getElementById('prompt-template').value;
    if (!template) return;

    const previewArea = document.getElementById('preview-area');
    const previewOutput = document.getElementById('preview-output');

    try {
      const resp = await fetch('/api/prompts/preview', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({template: template})
      });
      const data = await resp.json();
      if (data.error) {
        previewOutput.textContent = 'Error: ' + data.error;
      } else {
        previewOutput.textContent = data.rendered;
      }
      previewArea.style.display = 'block';
    } catch (err) {
      previewOutput.textContent = 'Error: ' + err.message;
      previewArea.style.display = 'block';
    }
  });

  async function deletePrompt(id) {
    if (!confirm('Delete this prompt?')) return;
    const resp = await fetch('/api/prompts/' + id, {method: 'DELETE'});
    if (!resp.ok) {
      const data = await resp.json();
      alert(data.error || 'Failed');
      return;
    }
    loadPrompts();
  }

  loadPrompts();
})();
</script>
{% endblock %}
